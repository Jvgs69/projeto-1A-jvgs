<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetros de Manobras BMX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="openTab(event, 'barspin')">Bar Spin</button>
            <button class="tab-btn" onclick="openTab(event, 'tailwhip')">Tailwhip</button>
            <button class="tab-btn" onclick="openTab(event, 'manual')">Manual</button>
            <button class="tab-btn" onclick="openTab(event, 'suicide')">Suicide</button>
        </nav>

        <section class="tabs-content">
            <div id="barspin" class="tab-panel active">
                <img src="https://rideukbmx.com/wp-content/uploads/2015/07/Basics2014_736.jpg" alt="Manobra Bar Spin" class="manobra-img">
                <h2>Manobra: Bar Spin</h2>
                <p>Tempo restante para a conclusão:</p>
                <div class="countdown" id="timer-barspin"></div>
            </div>

            <div id="tailwhip" class="tab-panel">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTr44Ewim0Xb_8mNdyeUuIn2AWqR72gjeA4Bg&s" alt="Manobra Tailwhip" class="manobra-img">
                <h2>Manobra: Tailwhip</h2>
                <p>Tempo restante para a conclusão:</p>
                <div class="countdown" id="timer-tailwhip"></div>
            </div>

            <div id="manual" class="tab-panel">
                <img src="https://www.wikihow.com/images/thumb/d/da/Do-a-Manual-on-a-Bicycle-Step-7-Version-2.jpg/aid119538-v4-1200px-Do-a-Manual-on-a-Bicycle-Step-7-Version-2.jpg" alt="Manobra Manual" class="manobra-img">
                <h2>Manobra: Manual</h2>
                <p>Tempo restante para a conclusão:</p>
                <div class="countdown" id="timer-manual"></div>
            </div>

            <div id="suicide" class="tab-panel">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFhE58eu3Oi5MRUaC58c9EuSFc44MMl-vZ8g&s" alt="Manobra Suicide" class="manobra-img">
                <h2>Manobra: Suicide</h2>
                <p>Tempo restante para a conclusão:</p>
                <div class="countdown" id="timer-suicide"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
